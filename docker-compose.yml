version: '3.8'

services:
  db:
    image: postgres:17-alpine
    container_name: inbot-db
    restart: always
    environment:
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      POSTGRES_DB: ${DATABASE_NAME:-contacts_db}
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./back/in-bot
      dockerfile: Dockerfile
    container_name: inbot-api
    restart: always
    depends_on:
      - db
    ports:
      - "${PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://${DATABASE_USER:-postgres}:${DATABASE_PASSWORD:-postgres}@db:5432/${DATABASE_NAME:-contacts_db}?schema=public
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-changeme}
      VIACEP_BASE_URL: ${VIACEP_BASE_URL:-https://viacep.com.br/ws}
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:-http://localhost:5173}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: production

  front:
    build:
      context: ./front/in-bot
      dockerfile: Dockerfile
    container_name: inbot-front
    restart: always
    ports:
      - "5173:80"
    environment:
      VITE_API_URL: http://localhost:3000
    depends_on:
      - api

volumes:
  postgres_data:
